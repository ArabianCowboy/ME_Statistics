{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-card">
        <div class="error-card__code">500</div>
        <h1 class="error-card__title">Something Went Wrong</h1>
        <p class="error-card__text">An unexpected error occurred. Please try again later.</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn--primary">Go Home</a>
    </div>
</div>
{% endblock %}
