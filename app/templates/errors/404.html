{% extends "base.html" %}
{% block title %}404 — Not Found{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-card">
        <div class="error-card__code">404</div>
        <h1 class="error-card__title">Page Not Found</h1>
        <p class="error-card__text">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn--primary">Go Home</a>
    </div>
</div>
{% endblock %}
