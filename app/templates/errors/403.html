{% extends "base.html" %}
{% block title %}403 — Forbidden{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-card">
        <div class="error-card__code">403</div>
        <h1 class="error-card__title">Access Denied</h1>
        <p class="error-card__text">You don't have permission to access this page.</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn--primary">Go Home</a>
    </div>
</div>
{% endblock %}
