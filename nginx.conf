# ME Statistics — Nginx Reverse Proxy Configuration
# ===================================================
# Place in /etc/nginx/sites-available/me_statistics
# Then: sudo ln -s /etc/nginx/sites-available/me_statistics /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx

# Rate limiting zone (10 req/sec per IP)
limit_req_zone $binary_remote_addr zone=me_limit:10m rate=10r/s;

server {
    listen 80;
    server_name me-statistics.example.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name me-statistics.example.com;

    # ── SSL Certificates (Let's Encrypt) ─────────────────────
    ssl_certificate     /etc/letsencrypt/live/me-statistics.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/me-statistics.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Client Body Size (for file uploads) ──────────────────
    client_max_body_size 10M;

    # ── Static Files (served directly by Nginx) ──────────────
    location /static/ {
        alias /opt/me-statistics/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Favicon ──────────────────────────────────────────────
    location = /favicon.ico {
        alias /opt/me-statistics/app/static/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # ── Health Check (no rate limit) ─────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Application ──────────────────────────────────────────
    location / {
        limit_req zone=me_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/me_statistics_access.log;
    error_log  /var/log/nginx/me_statistics_error.log;
}
